name: Feature request
description: Propón una mejora para Panopticon.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema o necesidad
      description: ¿Qué caso de uso quieres resolver?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Propuesta
      description: Describe la solución deseada.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Otras opciones o workarounds.
