name: Bug report
description: Reporta un fallo reproducible en Panopticon.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: ¿Qué está fallando?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista exacta de pasos.
      placeholder: |
        1. Abrir...
        2. Hacer click en...
        3. Ver error...
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: Pega extractos de `%TEMP%/panopticon/logs/` si existen.
  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Screenshots, settings.toml relevante, etc.
