name: Bug report
description: Report a reproducible bug in Panopticon.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is failing?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact list of steps.
      placeholder: |
        1. Open...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste excerpts from `%TEMP%/panopticon/logs/` if available.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, relevant settings.toml content, etc.
